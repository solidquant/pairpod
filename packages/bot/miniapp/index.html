<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>pairpod terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: -apple-system, system-ui, sans-serif;
      }
      #app { display: flex; flex-direction: column; height: 100%; }
      #term { flex: 1; min-height: 0; padding: 4px; }
      #keys {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        padding: 6px;
        background: #161616;
        border-top: 1px solid #2a2a2a;
      }
      #ctl {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        flex: 1;
        min-width: 0;
      }
      #arrows {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 38px);
        grid-auto-rows: 32px;
        gap: 4px;
      }
      #arrows .sp { visibility: hidden; }
      .key {
        padding: 8px 10px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 14px;
        color: #e5e5e5;
        background: #232323;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
      }
      #ctl .key { min-width: 0; }
      #arrows .key { padding: 0; font-size: 16px; }
      .key:active { background: #3a3a3a; }
      #nl { color: #9ad; }
      #compose {
        display: flex;
        gap: 6px;
        padding: 6px;
        background: #161616;
        border-top: 1px solid #2a2a2a;
      }
      #input {
        flex: 1;
        min-width: 0;
        resize: none;
        max-height: 300px;
        padding: 8px 10px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: clamp(14px, 3.4vw, 16px);
        line-height: 1.35;
        color: #e5e5e5;
        background: #0a0a0a;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        outline: none;
      }
      #input::placeholder { font-size: 13px; opacity: 0.7; }
      #send {
        flex: 0 0 auto;
        padding: 8px 14px;
        font-size: 14px;
        color: #0a0a0a;
        background: #e5e5e5;
        border: none;
        border-radius: 6px;
      }
      #send:active { background: #b5b5b5; }
      #attach {
        flex: 0 0 auto;
        padding: 8px 10px;
        font-size: 16px;
        color: #e5e5e5;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
      }
      #attach:active { background: #3a3a3a; }
      #app.dragging #compose { outline: 2px dashed #6aa9ff; outline-offset: -2px; }
      #overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 10, 0.85);
      }
      #overlay.show { display: flex; }
      #overlay button {
        padding: 10px 16px;
        color: #e5e5e5;
        background: #232323;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        font-size: 14px;
      }
      #toast {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 12px;
        background: rgba(40, 40, 40, 0.96);
        color: #e5e5e5;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.15s;
        pointer-events: none;
        z-index: 10;
      }
      #toast.show { opacity: 1; }
      #jump {
        position: absolute;
        right: 14px;
        bottom: 132px;
        width: 38px;
        height: 38px;
        border-radius: 19px;
        background: rgba(40, 40, 40, 0.96);
        color: #e5e5e5;
        border: 1px solid #3a3a3a;
        font-size: 18px;
        line-height: 1;
        display: none;
        z-index: 11;
      }
      #jump.show { display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="term"></div>
      <div id="compose">
        <textarea id="input" rows="1" placeholder="Message Claude…  (Enter sends, Shift+Enter = newline)"
          autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
        <button id="attach" title="Send image">📎</button>
        <button id="send">Send</button>
      </div>
      <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple style="display:none" />
      <div id="keys">
        <div id="ctl">
          <button class="key" data-key="esc">Esc</button>
          <button class="key" data-key="tab">Tab</button>
          <button class="key" data-key="stab">&#8679;Tab</button>
          <button class="key" data-key="bksp">&#9003;</button>
          <button class="key" data-key="ctrlc">^C</button>
          <button class="key" data-key="clr">Clr</button>
          <button class="key" id="nl">&#8679;&#9166;</button>
          <button class="key" data-key="enter">&#9166;</button>
        </div>
        <div id="arrows">
          <span class="sp"></span>
          <button class="key" data-key="up">&#8593;</button>
          <span class="sp"></span>
          <button class="key" data-key="left">&#8592;</button>
          <button class="key" data-key="down">&#8595;</button>
          <button class="key" data-key="right">&#8594;</button>
        </div>
      </div>
    </div>
    <div id="overlay"><button id="reconnect">Disconnected — tap to reconnect</button></div>
    <div id="toast"></div>
    <button id="jump" aria-label="Jump to bottom">↓</button>

    <script>
      const ESC = String.fromCharCode(27);
      const KEYS = {
        esc: ESC,
        tab: "\t",
        stab: ESC + "[Z",
        up: ESC + "[A",
        down: ESC + "[B",
        left: ESC + "[D",
        right: ESC + "[C",
        enter: "\r",
        ctrlc: String.fromCharCode(3),
        bksp: String.fromCharCode(127),
        clr: String.fromCharCode(21),
      };

      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === "function") tg.disableVerticalSwipes();
      }

      const params = new URLSearchParams(location.search);
      const pod = params.get("pod") || "";
      const session = params.get("session") || "";

      // Arrived via a notification's "Open" button: delete that message so the chat stays clean.
      const dismissCid = params.get("cid"), dismissMid = params.get("mid");
      if (dismissCid && dismissMid) {
        fetch(location.origin + "/dismiss", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            cid: Number(dismissCid),
            mid: Number(dismissMid),
            tgData: (tg && tg.initData) || "",
          }),
        }).catch(function () {});
      }

      const term = new window.Terminal({
        disableStdin: true,
        cursorBlink: false,
        fontFamily: '"JetBrains Mono", "Cascadia Code", Menlo, Monaco, monospace',
        fontSize: 13,
        scrollback: 1000,
        allowProposedApi: true,
        theme: {
          background: "#0a0a0a",
          foreground: "#e5e5e5",
          cursor: "#0a0a0a",
          cursorAccent: "#0a0a0a",
          selectionBackground: "#444444",
        },
      });
      const fit = new window.FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(document.getElementById("term"));

      function loadRenderer() {
        try {
          const w = new window.WebglAddon.WebglAddon();
          w.onContextLoss(() => w.dispose());
          term.loadAddon(w);
          return "webgl";
        } catch (e) {}
        try {
          const c = new window.CanvasAddon.CanvasAddon();
          term.loadAddon(c);
          return "canvas";
        } catch (e) {}
        return "dom";
      }
      loadRenderer();
      const savedFont = parseInt(localStorage.getItem("pp_fontsize") || "", 10);
      if (savedFont >= 8 && savedFont <= 28) term.options.fontSize = savedFont;
      fit.fit();

      const helper = document.querySelector("#term .xterm-helper-textarea");
      if (helper) {
        helper.readOnly = true;
        helper.tabIndex = -1;
        helper.setAttribute("inputmode", "none");
        helper.setAttribute("aria-hidden", "true");
      }

      let ws = null;

      function wsUrl() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        const tgData = (tg && tg.initData) || "";
        return (
          proto + "://" + location.host + "/attach" +
          "?pod=" + encodeURIComponent(pod) +
          "&session=" + encodeURIComponent(session) +
          "&cols=" + term.cols + "&rows=" + term.rows +
          "&tgData=" + encodeURIComponent(tgData)
        );
      }

      let reconnectAttempts = 0;
      let reconnectTimer = null;

      function showOverlay(show, msg) {
        document.getElementById("overlay").classList.toggle("show", show);
        if (msg) document.getElementById("reconnect").textContent = msg;
      }

      function handleClose(e) {
        const fatal = e && (e.code === 4003 || e.code === 4004);
        if (!fatal && reconnectAttempts < 5) {
          reconnectAttempts++;
          showOverlay(true, "Reconnecting… (" + reconnectAttempts + ")");
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 800 * reconnectAttempts);
          return;
        }
        if (e && e.code === 4004) showOverlay(true, "Session ended — start one from the bot, then reopen");
        else if (e && e.code === 4003) showOverlay(true, "Unauthorized — reopen from the bot");
        else showOverlay(true, "Disconnected — tap to reconnect");
      }

      function connect() {
        clearTimeout(reconnectTimer);
        showOverlay(false);
        // Tear down any prior socket first; otherwise its orphaned onclose fires a
        // server-initiated detach back into reconnect, and overlapping attaches ping-pong forever.
        if (ws) {
          ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
          try { ws.close(); } catch {}
        }
        ws = new WebSocket(wsUrl());
        ws.binaryType = "arraybuffer";
        ws.onopen = () => { reconnectAttempts = 0; doRefit(); };
        ws.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) {
            const u8 = new Uint8Array(e.data);
            updateModes(u8);
            term.write(u8, updateJump);
          } else {
            term.write(e.data, updateJump);
          }
        };
        ws.onclose = (e) => handleClose(e);
        ws.onerror = () => {};
      }

      function send(data) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return false;
        ws.send(data);
        return true;
      }

      let lastCols = 0;
      let lastRows = 0;
      let refitTimer = null;

      function doRefit() {
        fit.fit();
        if (term.cols !== lastCols || term.rows !== lastRows) {
          lastCols = term.cols;
          lastRows = term.rows;
          send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
        }
      }

      function refit() {
        clearTimeout(refitTimer);
        refitTimer = setTimeout(doRefit, 100);
      }

      function setFontSize(px) {
        const n = Math.max(8, Math.min(28, Math.round(px)));
        if (n === term.options.fontSize) return;
        term.options.fontSize = n;
        localStorage.setItem("pp_fontsize", String(n));
        doRefit();
      }

      document.addEventListener("keydown", (e) => {
        if (!(e.ctrlKey || e.metaKey)) return;
        if (e.key === "+" || e.key === "=") { e.preventDefault(); setFontSize(term.options.fontSize + 1); }
        else if (e.key === "-" || e.key === "_") { e.preventDefault(); setFontSize(term.options.fontSize - 1); }
        else if (e.key === "0") { e.preventDefault(); setFontSize(13); }
      });

      const ro = new ResizeObserver(() => refit());
      ro.observe(document.getElementById("term"));
      window.addEventListener("resize", refit);
      if (tg && tg.onEvent) tg.onEvent("viewportChanged", refit);
      setTimeout(refit, 150);
      setTimeout(refit, 500);

      for (const btn of document.querySelectorAll("[data-key]")) {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          if (btn.dataset.key === "tab") {
            sendTab();
            return;
          }
          const seq = KEYS[btn.dataset.key];
          if (seq) {
            send(seq);
            term.scrollToBottom();
          }
        });
      }

      const input = document.getElementById("input");
      input.placeholder = "Message Claude…  ·  Enter to send";

      function autoGrow() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 300) + "px";
      }

      function submitInput() {
        const text = input.value;
        // Staged images (uploaded but not yet sent) ride along as [image: …] refs so the user
        // can attach an image and type a message, then send both together.
        const refs = staged.map((p) => "[image: " + p + "]").join(" ");
        const payload = refs ? (text ? refs + " " + text : refs) : text;
        send(JSON.stringify({ type: "cancelcopy" }));
        // Don't clear the box until the text is actually on the wire — otherwise a closed
        // socket silently eats the prompt.
        if (payload.length === 0) {
          send("\r");
          term.scrollToBottom();
          return;
        }
        // Text + submitting Enter go in one frame; a deferred Enter gets dropped when the
        // mobile webview blurs on keyboard dismiss. Bracketed paste keeps newlines literal.
        const sent = bracketOn
          ? send("\x1b[200~" + payload + "\x1b[201~")
          : send(payload);
        if (!sent) {
          toast("Not connected — kept, reconnecting…");
          return;
        }
        staged = [];
        updateStaged();
        input.value = "";
        autoGrow();
        input.focus();
        term.scrollToBottom();
        // deferred \r: low-latency docker glues a trailing \r into the paste so the app never
        // sees Enter; a gap makes it a distinct keystroke. guard re-buffers if the socket dropped.
        setTimeout(() => {
          if (!send("\r")) {
            input.value = text;
            autoGrow();
            toast("Reconnected — tap Send to submit");
          }
        }, Math.min(120 + Math.floor(payload.length / 25), 1500));
      }

      function insertNewline() {
        const s = input.selectionStart;
        const end = input.selectionEnd;
        input.value = input.value.slice(0, s) + "\n" + input.value.slice(end);
        input.selectionStart = input.selectionEnd = s + 1;
        autoGrow();
        input.focus();
      }

      // The xterm is read-only, so a partial command can only reach the shell's line via the
      // compose box. Flush it WITHOUT Enter, then send Tab, so completion has something to act on.
      function sendTab() {
        if (input.value.length > 0) {
          send(input.value);
          input.value = "";
          autoGrow();
        }
        send("\t");
        input.focus();
        term.scrollToBottom();
      }

      input.addEventListener("input", () => { autoGrow(); term.scrollToBottom(); });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          sendTab();
          return;
        }
        if (e.key !== "Enter" || e.shiftKey) return;
        e.preventDefault();
        submitInput();
      });
      document.getElementById("send").addEventListener("click", (e) => {
        e.preventDefault();
        submitInput();
      });
      document.getElementById("nl").addEventListener("click", (e) => {
        e.preventDefault();
        insertNewline();
      });

      // Image upload: POST raw bytes to /upload; the server places the file on the pod and
      // returns its path. We *stage* the path (not send) so the user can attach an image and
      // then type a message — both go out together on the next Send as "[image: <path>] text".
      const fileInput = document.getElementById("file");
      const attachBtn = document.getElementById("attach");
      const composePlaceholder = "Message Claude…  ·  Enter to send";
      let staged = [];

      function updateStaged() {
        const n = staged.length;
        attachBtn.textContent = n ? "📎" + n : "📎";
        input.placeholder = n
          ? n + (n > 1 ? " images" : " image") + " attached — add a message, then Send"
          : composePlaceholder;
      }

      async function uploadImage(file) {
        if (!file || !/^image\//.test(file.type)) {
          toast("Only PNG/JPG/WebP/GIF images");
          return;
        }
        if (file.size > 20 * 1024 * 1024) {
          toast("Image over 20MB");
          return;
        }
        const tgData = (tg && tg.initData) || "";
        const url =
          location.origin + "/upload?pod=" + encodeURIComponent(pod) +
          "&session=" + encodeURIComponent(session) +
          "&tgData=" + encodeURIComponent(tgData);
        toast("Uploading image…");
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": file.type || "application/octet-stream" },
            body: file,
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.path) {
            toast(data.error || "Upload failed");
            return;
          }
          staged.push(data.path);
          updateStaged();
          input.focus();
          toast("Image attached — add a message, then Send");
        } catch (_e) {
          toast("Upload failed");
        }
      }

      // Stage several images at once (multi-select / multi-paste / multi-drop), uploaded in
      // order so the [image: …] refs keep their selection order on the next Send.
      async function uploadFiles(list) {
        const imgs = Array.from(list || []).filter((f) => f && /^image\//.test(f.type));
        if (!imgs.length) {
          toast("Only PNG/JPG/WebP/GIF images");
          return;
        }
        for (const f of imgs) await uploadImage(f);
      }

      attachBtn.addEventListener("click", (e) => {
        e.preventDefault();
        fileInput.click();
      });
      fileInput.addEventListener("change", () => {
        uploadFiles(fileInput.files);
        fileInput.value = "";
      });
      input.addEventListener("paste", (e) => {
        const items = (e.clipboardData && e.clipboardData.items) || [];
        const files = [];
        for (const it of items) {
          if (it.kind === "file" && /^image\//.test(it.type)) files.push(it.getAsFile());
        }
        if (files.length) {
          e.preventDefault();
          uploadFiles(files);
        }
      });
      const appEl = document.getElementById("app");
      ["dragenter", "dragover"].forEach((ev) =>
        appEl.addEventListener(ev, (e) => { e.preventDefault(); appEl.classList.add("dragging"); })
      );
      ["dragleave", "drop"].forEach((ev) =>
        appEl.addEventListener(ev, (e) => { e.preventDefault(); appEl.classList.remove("dragging"); })
      );
      appEl.addEventListener("drop", (e) => {
        if (e.dataTransfer) uploadFiles(e.dataTransfer.files);
      });

      // Sniff the output stream for private-mode toggles (CSI ? <n> h/l). mouseOn drives
      // scroll-forwarding; bracketOn tells us the app accepts bracketed paste (DECSET 2004),
      // which we use to send multi-line input without each newline acting as a submit.
      let mouseOn = false;
      let bracketOn = false;

      function updateModes(u8) {
        for (let i = 0; i + 3 < u8.length; i++) {
          if (u8[i] !== 0x1b || u8[i + 1] !== 0x5b || u8[i + 2] !== 0x3f) continue;
          let j = i + 3;
          const nums = [];
          let cur = 0;
          let has = false;
          while (j < u8.length) {
            const c = u8[j];
            if (c >= 0x30 && c <= 0x39) { cur = cur * 10 + (c - 0x30); has = true; j++; }
            else if (c === 0x3b) { nums.push(cur); cur = 0; j++; }
            else break;
          }
          if (has) nums.push(cur);
          if (j < u8.length && (u8[j] === 0x68 || u8[j] === 0x6c)) {
            const on = u8[j] === 0x68;
            for (const n of nums) {
              if (n === 1000 || n === 1002 || n === 1003 || n === 1006) mouseOn = on;
              if (n === 2004) bracketOn = on;
            }
          }
        }
      }

      function sendWheel(up) {
        if (!mouseOn) return;
        const col = Math.max(1, Math.ceil(term.cols / 2));
        const row = Math.max(1, Math.ceil(term.rows / 2));
        send(ESC + "[<" + (up ? 64 : 65) + ";" + col + ";" + row + "M");
      }

      const termEl = document.getElementById("term");
      const NOTCH = 18;
      let lastTouchY = null;
      let pinchDist = null;
      let pinchFont = 0;
      let lpTimer = null;
      let selectMode = false;
      let selAnchor = null;
      let touchStartX = 0;
      let touchStartY = 0;
      let touchMoved = false;
      let lastTouchEnd = 0;
      let toastTimer = null;

      function fingerDist(t) {
        return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
      }

      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 1300);
      }

      function cellFromXY(x, y) {
        const rect = termEl.getBoundingClientRect();
        const cellH = Math.max(1, (termEl.clientHeight - 8) / term.rows);
        const cellW = Math.max(1, (termEl.clientWidth - 8) / term.cols);
        const col = Math.max(0, Math.min(term.cols - 1, Math.floor((x - rect.left - 4) / cellW)));
        const vrow = Math.max(0, Math.min(term.rows - 1, Math.floor((y - rect.top - 4) / cellH)));
        return { col, row: term.buffer.active.viewportY + vrow };
      }

      function selectBetween(a, b) {
        const ai = a.row * term.cols + a.col;
        const bi = b.row * term.cols + b.col;
        const start = ai <= bi ? a : b;
        term.select(start.col, start.row, Math.abs(bi - ai) + 1);
      }

      function copySelection() {
        const text = term.getSelection();
        if (!text) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(
            () => toast("Copied " + text.length + " chars"),
            () => toast("Copy blocked by browser")
          );
        } else {
          toast("Clipboard unavailable");
        }
      }

      termEl.addEventListener("touchstart", (e) => {
        clearTimeout(lpTimer);
        selectMode = false;
        if (e.touches.length >= 2) {
          pinchDist = fingerDist(e.touches);
          pinchFont = term.options.fontSize;
          lastTouchY = null;
          return;
        }
        pinchDist = null;
        lastTouchY = e.touches[0].clientY;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchMoved = false;
        lpTimer = setTimeout(() => {
          selectMode = true;
          term.clearSelection();
          selAnchor = cellFromXY(touchStartX, touchStartY);
          selectBetween(selAnchor, selAnchor);
          if (navigator.vibrate) navigator.vibrate(15);
          toast("Select mode — drag, release to copy");
        }, 400);
      }, { passive: true });

      termEl.addEventListener("touchmove", (e) => {
        if (e.touches.length >= 2 && pinchDist) {
          clearTimeout(lpTimer);
          e.preventDefault();
          setFontSize(pinchFont * (fingerDist(e.touches) / pinchDist));
          return;
        }
        const y = e.touches[0].clientY;
        if (selectMode) {
          e.preventDefault();
          selectBetween(selAnchor, cellFromXY(e.touches[0].clientX, y));
          return;
        }
        if (!touchMoved && Math.hypot(e.touches[0].clientX - touchStartX, y - touchStartY) > 10) {
          touchMoved = true;
          clearTimeout(lpTimer);
        }
        if (lastTouchY === null || !mouseOn) return;
        e.preventDefault();
        let dy = y - lastTouchY;
        while (Math.abs(dy) >= NOTCH) {
          sendWheel(dy > 0);
          dy += dy > 0 ? -NOTCH : NOTCH;
        }
        lastTouchY = y - dy;
      }, { passive: false });

      termEl.addEventListener("touchend", (e) => {
        clearTimeout(lpTimer);
        if (e.touches.length < 2) pinchDist = null;
        if (e.touches.length === 0) {
          lastTouchEnd = Date.now();
          if (selectMode) {
            if (term.hasSelection()) copySelection();
            selectMode = false;
          } else if (!touchMoved) {
            input.focus();
          }
          lastTouchY = null;
        }
      }, { passive: true });

      // App mouse-mode makes xterm swallow drag-to-select; reclaim it (Shift+drag = native chars).
      let mouseSelAnchor = null;
      termEl.addEventListener("mousedown", (e) => {
        if (!mouseOn || e.button !== 0 || e.shiftKey) return;
        e.preventDefault();
        e.stopPropagation();
        mouseSelAnchor = cellFromXY(e.clientX, e.clientY);
        term.clearSelection();
      }, true);
      termEl.addEventListener("mousemove", (e) => {
        if (mouseSelAnchor === null) return;
        e.preventDefault();
        selectBetween(mouseSelAnchor, cellFromXY(e.clientX, e.clientY));
      }, true);
      termEl.addEventListener("mouseup", () => {
        mouseSelAnchor = null;
        if (Date.now() - lastTouchEnd < 700) return;
        if (term.hasSelection()) copySelection();
        else input.focus();
      });

      termEl.addEventListener("wheel", (e) => {
        if (!mouseOn) return;
        e.preventDefault();
        e.stopPropagation();
        sendWheel(e.deltaY < 0);
      }, { passive: false, capture: true });

      document.getElementById("overlay").addEventListener("click", () => {
        reconnectAttempts = 0;
        connect();
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && (!ws || ws.readyState !== WebSocket.OPEN)) {
          reconnectAttempts = 0;
          connect();
        }
      });

      const jump = document.getElementById("jump");
      function updateJump() {
        const b = term.buffer.active;
        jump.classList.toggle("show", b.viewportY < b.baseY);
      }
      term.onScroll(updateJump);
      jump.addEventListener("click", () => {
        term.scrollToBottom();
        updateJump();
        input.focus();
      });

      connect();
      input.focus();
    </script>
  </body>
</html>
